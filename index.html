<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsWidget Gallery - App shortcut widget</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --gap: 16px;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 40px;
            text-align: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .masonry {
            max-width: 1200px;
            margin: 0 auto;
            column-count: 4;
            column-gap: var(--gap);
        }

        .item {
            display: inline-block;
            width: 100%;
            margin-bottom: var(--gap);
            break-inside: avoid;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .item:hover {
            transform: scale(1.02);
        }

        .item img {
            width: 100%;
            display: block;
            height: auto;
        }

        @media (max-width: 1024px) {
            .masonry { column-count: 3; }
        }

        @media (max-width: 768px) {
            .masonry { column-count: 2; }
        }

        @media (max-width: 480px) {
            .masonry { column-count: 1; }
            padding: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>AsWidget Gallery</h1>
    </header>

    <main class="masonry" id="gallery">
        <!-- Images will be generated here -->
    </main>

    <script>
        const gallery = document.getElementById('gallery');
        const imageCount = 20;

        for (let i = 0; i < imageCount; i++) {
            const item = document.createElement('div');
            item.className = 'item';

            // Random height for waterfall effect
            const width = 400;
            const height = Math.floor(Math.random() * (600 - 300 + 1)) + 300;

            const img = document.createElement('img');
            img.src = `https://picsum.photos/${width}/${height}?random=${i}`;
            img.alt = `Random Image ${i}`;
            img.loading = 'lazy';

            item.appendChild(img);
            gallery.appendChild(item);
        }
    </script>
</body>
</html>
