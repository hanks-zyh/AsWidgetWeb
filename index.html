<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsWidget Gallery - App shortcut widget</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --gap: 16px;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 40px;
            text-align: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .masonry {
            max-width: 1200px;
            margin: 0 auto;
            column-count: 4;
            column-gap: var(--gap);
        }

        .item {
            display: inline-block;
            width: 100%;
            margin-bottom: var(--gap);
            break-inside: avoid;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .item:hover {
            transform: scale(1.02);
        }

        .item img {
            width: 100%;
            display: block;
            height: auto;
        }

        @media (max-width: 1024px) {
            .masonry { column-count: 3; }
        }

        @media (max-width: 768px) {
            .masonry { column-count: 2; }
        }

        @media (max-width: 480px) {
            .masonry { column-count: 1; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AsWidget Gallery</h1>
    </header>

    <main class="masonry" id="gallery">
        <!-- Images will be generated here -->
    </main>
        <!-- SCRIPT_REPLACE_START -->
	<script>
    const gallery = document.getElementById('gallery');
    const imagesArray = [
    "images/fb_bottom_3.webp",
    "images/ig_right_3.webp",
    "images/reddit_2x2.webp",
    "images/spotify_3.webp",
    "images/x_center_4.webp",
    "images/youtube_bottom_3.webp",
    "images/youtube_circle_6.webp"
];

    imagesArray.forEach((src, index) => {
        const item = document.createElement('div');
        item.className = 'item';

        const img = document.createElement('img');
        img.src = src;
        img.alt = `Image ${index + 1}`;
        img.loading = 'lazy';

        item.appendChild(img);
        gallery.appendChild(item);
    });
     </script>
	<!-- SCRIPT_REPLACE_END -->

</body>
</html>
